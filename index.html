<!DOCTYPE html>
<html>

<head>
</head>

<body onload="sendPostRequest()">
    <script>
        function sendPostRequest() {
            const urlParams = new URLSearchParams(window.location.search);
            const userId = urlParams.get("user_id");
            const webApp = 'https://script.google.com/macros/s/AKfycbx7mi7c0-2h3w4Mnc-M28f6BIydQPXqbyzvM0fA5hupErAh-Pk5gyM6R2MFpJ2gaBA/exec';
            // URL эндпоинта, на который отправляем запрос
            const url = `${webApp}?mode=transfer&user_id=${encodeURIComponent(userId)}`;

            try {
                // отправляем запрос 
                const response = await fetch(url);

                if (!response.ok) {
                    throw new Error(`Ошибка сети: ${response.status}`);
                }

                // получаем JSON
                const data = await response.json();
                
                console.log("Данные получено:", data);
                 // заполняем выпадающий список значениями из полученого масива  
                // fillDropdown(data); 

            } catch (error) {
                console.error("Возникла ошибка:", error);
            }
        }
    </script>
</body>
</html>
