<!DOCTYPE html>
<html>

<head>
</head>

<body onload="sendPostRequest()">
    <script>
function sendPostRequest() {

    const urlParams = new URLSearchParams(window.location.search);
    const userId = urlParams.get("user_id");

    const webApp = 'https://script.google.com/macros/s/AKfycbx7mi7c0-2h3w4Mnc-M28f6BIydQPXqbyzvM0fA5hupErAh-Pk5gyM6R2MFpJ2gaBA/exec';

    const url = `${webApp}?mode=order&user_id=${encodeURIComponent(userId)}`;

    fetch(url)
        .then(response => response.json())
        .then(response => {

            const objectSelect = document.getElementById("objectSelect");
            const agregatSelect = document.getElementById("agregatSelect");

            objectSelect.innerHTML =
                '<option disabled selected>Вибір техніки</option>' +
                response.objects_selector;

            agregatSelect.innerHTML =
                '<option disabled selected>Вибір агрегату</option>' +
                response.agregat_selector;

        })
        .catch(err => console.error("Ошибка загрузки списков:", err));
}

                          console.log (response)
    </script>

</body>

</html>
