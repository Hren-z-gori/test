        #fixed_wrap {
            position: fixed;
            left: 0;
            right: 0;
            top: 0;
            transform: translateY(100vh);
        }

        .viewport_border,
        .viewport_stable_border {
            position: fixed;
            left: 0;
            right: 0;
            top: 0;
            height: var(--tg-viewport-height, 100vh);
            pointer-events: none;
        }

        .viewport_stable_border {
            height: var(--tg-viewport-stable-height, 100vh);
        }

        .viewport_border:before,
        .viewport_stable_border:before {
            content: attr(text);
            display: inline-block;
            position: absolute;
            background: gray;
            right: 0;
            top: 0;
            font-size: 7px;
            padding: 2px 4px;
            vertical-align: top;
        }

        .viewport_stable_border:before {
            background: green;
            left: 0;
            right: auto;
        }

        .viewport_border:after,
        .viewport_stable_border:after {
            content: '';
            display: block;
            position: absolute;
            left: 0;
            right: 0;
            top: 0;
            bottom: 0;
            border: 2px dashed gray;
        }

        .viewport_stable_border:after {
            border-color: green;
        }

        small {
            font-size: 12px;
        }

        function sendPostRequest() {
            const urlParams = new URLSearchParams(window.location.search);
            const userId = urlParams.get("user_id");

            // отправляем запрос     
            const xhr = new XMLHttpRequest();
            const url = webApp; // URL эндпоинта, на который отправляем запрос
            const params = `mode=addLink&user_id=${userId}`; // параметры POST-запроса в формате строки
            xhr.open('POST', url, true);
            xhr.setRequestHeader('Content-type', 'application/x-www-form-urlencoded');
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    // если запрос успешно выполнен, обрабатываем ответ
                    const response = JSON.parse(xhr.response);

                  	objectSelect.innerHTML  = objects_selector;
				  	const agregatSelect = document.getElementById("select_agregat");
                  	agregatSelect.innerHTML  = agregat_selector;

                }
            };
            xhr.send(params);
        }
