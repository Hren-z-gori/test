    <script>
        function sendPostRequest() {
            const urlParams = new URLSearchParams(window.location.search);
            const userId = urlParams.get("user_id");
            const webApp = 'https://script.google.com/macros/s/AKfycbx7mi7c0-2h3w4Mnc-M28f6BIydQPXqbyzvM0fA5hupErAh-Pk5gyM6R2MFpJ2gaBA/exec';
            // отправляем запрос     
            const xhr = new XMLHttpRequest();
            const url = webApp; // URL эндпоинта, на который отправляем запрос
            const params = `mode=addLink&user_id=${userId}`; // параметры POST-запроса в формате строки
            xhr.open('POST', url, true);
            xhr.setRequestHeader('Content-type', 'application/x-www-form-urlencoded');
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    // если запрос успешно выполнен, обрабатываем ответ
                    const response = JSON.parse(xhr.response);
                    // заполняем выпадающий список значениями из полученого масива  

                    const objects_selector = response.objects_selector;
                    const agregat_selector = response.agregat_selector;
                    const objectSelect = document.getElementById("objectSelect");
                    const agregatSelect = document.getElementById("agregatSelect");
                    objectSelect.innerHTML = objects_selector;
                    agregatSelect.innerHTML = '<option disabled selected>Выбор агрегата</option>';

                }
            };
            xhr.send(params);
        }

        function showCurrentDate() {
            var data = new Date(),
                hour = data.getHours().toString().padStart(2, '0');
            minutes = data.getMinutes().toString().padStart(2, '0');
            new_value = data.toISOString().slice(0, 10);
            document.getElementById("date").value = new_value;
            document.getElementById("time").value = hour + ":" + minutes;

        }
        showCurrentDate();
    </script>
